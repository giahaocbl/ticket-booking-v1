global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: ticket-booking-local

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot services. When running the JVMs on the host (IDE / `mvn spring-boot:run`),
  # the Prometheus container reaches them via `host.docker.internal` (mapped in compose).
  # When running the services as containers, replace the host with the service's container name.
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8086']
        labels:
          application: gateway-service

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          application: user-service

  - job_name: event-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          application: event-service

  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8083']
        labels:
          application: order-service

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8084']
        labels:
          application: payment-service

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8085']
        labels:
          application: notification-service

  - job_name: inventory-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8087']
        labels:
          application: inventory-service
