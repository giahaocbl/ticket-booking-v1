spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 30s
      default-filters:
        # Strip potentially dangerous inbound headers from clients
        - RemoveRequestHeader=X-User-Id
        - RemoveRequestHeader=X-User-Email
        - RemoveRequestHeader=X-User-Roles
      routes:
        # user-service
        - id: user-service-auth
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: user-service-users
          uri: http://localhost:8081
          predicates:
            - Path=/api/users,/api/users/**

        # event-service
        - id: event-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/events/**,/api/venues/**,/api/event-occurrences/**,/api/ticket-types/**

        # inventory-service
        - id: inventory-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/inventory/**

        # order-service
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders/**

server:
  port: 8086

jwt:
  # Must match user-service jwt.secret for HS256 verification
  secret: ${JWT_SECRET:change-me-in-prod}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.ticketbooking: DEBUG

